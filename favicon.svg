<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Cosine Technologies">
  <defs>
    <linearGradient id="fav-arc" x1="14" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF1F5"/>
      <stop offset="0.45" stop-color="#C0C7D1"/>
      <stop offset="1" stop-color="#7E8794"/>
    </linearGradient>
    <linearGradient id="fav-shield" x1="34" y1="22" x2="34" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E4E86"/>
      <stop offset="1" stop-color="#0A2342"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0F1115"/>

  <!-- circuit accents -->
  <g stroke="#0078D4" stroke-width="2" stroke-linecap="round">
    <path d="M8 28 H16"/>
    <path d="M8 40 H16"/>
  </g>
  <g fill="#0078D4">
    <circle cx="8" cy="28" r="2.1"/>
    <circle cx="8" cy="40" r="2.1"/>
  </g>

  <!-- "C" arc -->
  <path d="M50 18 A 21 21 0 1 0 50 50" stroke="url(#fav-arc)" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- shield -->
  <path d="M34 22 L45 25.5 V35 C45 41.5 40 45.5 34 48 C28 45.5 23 41.5 23 35 V25.5 Z" fill="url(#fav-shield)" stroke="#0078D4" stroke-width="1.4"/>

  <!-- padlock -->
  <path d="M31 33 V31 A3 3 0 0 1 37 31 V33" stroke="#C0C7D1" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <rect x="29.3" y="33" width="9.4" height="7.6" rx="1.6" fill="#C0C7D1"/>
  <circle cx="34" cy="36.3" r="1.3" fill="#0A2342"/>
  <rect x="33.3" y="36.6" width="1.4" height="2.7" rx="0.7" fill="#0A2342"/>
</svg>
